<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tissue Me Chua RD Lab</title>
<style>
:root{--bg:#f6f7f5;--surface:#fff;--soft:#eef4f0;--text:#1f2723;--muted:#68736d;--line:#dfe5df;--accent:#3c7f72;--accent2:#245e54;--warn:#b97020;--danger:#b94a48;--good:#2f7d50;--shadow:0 14px 34px rgba(31,39,35,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:24px 18px;background:rgba(255,255,255,.88);border-right:1px solid var(--line);display:flex;flex-direction:column;gap:22px}.brand{display:flex;gap:12px;align-items:center}.mark{width:44px;height:44px;border-radius:8px;background:var(--text);color:white;display:grid;place-items:center;font-weight:800}.brand h1{font-size:16px;margin:0}.brand p,.muted{color:var(--muted);margin:0;font-size:13px}.nav{display:grid;gap:6px}.nav button{height:42px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--muted);display:flex;align-items:center;gap:10px;padding:0 12px;text-align:left}.nav button.active,.nav button:hover{background:#e5f0ec;color:var(--accent2);border-color:#c9ddd6;font-weight:750}.trace{margin-top:auto;padding:16px;border:1px solid var(--line);border-radius:8px;background:var(--soft);display:grid;gap:4px}.main{padding:24px clamp(16px,3vw,36px) 40px}.top{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:22px}.eyebrow{color:var(--accent2);font-size:12px;font-weight:820;text-transform:uppercase;margin:0}.top h2{font-size:32px;margin:3px 0 0}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.search{height:42px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 12px;min-width:min(420px,42vw)}.btn{height:42px;border-radius:8px;border:1px solid var(--line);background:#fff;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:750}.btn.danger{background:#fae9e7;color:var(--danger);border-color:#efc3bd}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.grid2{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.85fr);gap:18px}.card,.panel{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.card{min-height:116px;padding:18px;display:grid;align-content:space-between}.card strong{font-size:30px}.panel{padding:18px}.panel.flush{padding:0;overflow:hidden}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.view{display:grid;gap:18px}.table-wrap{overflow:auto}table{width:100%;min-width:760px;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:14px}th{font-size:12px;color:var(--muted);text-transform:uppercase}.chip{display:inline-flex;min-height:28px;align-items:center;border-radius:999px;padding:0 10px;background:#f0f4f1;color:var(--muted);font-size:12px;font-weight:750}.active,.available,.pass{background:#e4f2e9;color:var(--good)}.watch,.monitor,.expiring,.low_stock{background:#fff0db;color:var(--warn)}.review,.reject,.expired,.contaminated,.discarded{background:#fae9e7;color:var(--danger)}form{display:grid;gap:14px}.formgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}label{display:grid;gap:7px;color:var(--muted);font-size:13px;font-weight:720}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fbfcfb;color:var(--text)}input,select{height:42px;padding:0 11px}textarea{min-height:86px;padding:11px;resize:vertical}.wide{grid-column:1/-1}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;padding:14px;border:1px solid #c9ddd6;border-radius:8px;background:#e5f0ec}.summary span{font-size:12px;color:var(--muted);font-weight:760;text-transform:uppercase}.summary strong{font-size:20px}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f0f4f1;overflow:hidden}.fill{height:100%;background:var(--accent);border-radius:999px}.photo{width:118px;height:82px;border:1px dashed #b7c5bd;border-radius:8px;background:#f0f4f1;display:grid;place-items:center;overflow:hidden;color:var(--muted);font-size:12px}.photo img{width:100%;height:100%;object-fit:cover}.upload{position:relative;overflow:hidden}.upload input{position:absolute;inset:0;opacity:0}.toast{position:fixed;right:18px;bottom:18px;background:var(--text);color:white;padding:14px 16px;border-radius:8px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:.18s;max-width:420px}.toast.show{opacity:1;transform:none}.hide{display:none!important}@media(max-width:980px){.app{grid-template-columns:86px 1fr}.brand div:not(.mark),.nav span:last-child,.trace{display:none}.side{align-items:center}.nav button{justify-content:center;padding:0}.grid4,.grid3{grid-template-columns:repeat(2,minmax(0,1fr))}.grid2{grid-template-columns:1fr}}@media(max-width:720px){.app{display:block}.side{position:static;height:auto;flex-direction:row;overflow:auto;padding:12px;border-right:0;border-bottom:1px solid var(--line)}.nav{display:flex;min-width:max-content}.main{padding:18px 14px 30px}.top,.head{align-items:stretch;flex-direction:column}.actions{justify-content:stretch}.search,.btn{width:100%}.grid4,.grid3,.grid2,.formgrid,.summary{grid-template-columns:1fr}.top h2{font-size:27px}}
</style>
</head>
<body>
<div class="app">
<aside class="side"><div class="brand"><div class="mark">TM</div><div><h1>Tissue Me Chua</h1><p>RD Lab System</p></div></div><nav class="nav" id="nav"></nav><div class="trace"><p class="eyebrow">Traceability</p><strong>Ready for RD work</strong><p>EXP · MED · SMP · BAT · OBS · CST</p></div></aside>
<main class="main"><header class="top"><div><p class="eyebrow">Plant tissue culture RD</p><h2 id="title">Dashboard</h2><p class="muted" id="subtitle">ภาพรวมงานทดลองและสิ่งที่ต้องติดตามวันนี้</p></div><div class="actions"><input class="search" id="search" placeholder="ค้นหา Experiment, Batch, Media Lot, Sample"><button class="btn" data-act="backup">Backup</button><button class="btn primary" data-go="observations">+ บันทึกผล</button></div></header><section class="view" id="view"></section></main>
</div><input id="importFile" class="hide" type="file" accept="application/json"><div id="toast" class="toast"></div>
<script>
const KEY='tmc-rd-lab-github-v1';
const modules=[['dashboard','Dashboard','ภาพรวมงานทดลองและสิ่งที่ต้องติดตามวันนี้','⌂'],['experiments','Experiments','ออกแบบการทดลอง เก็บผล วิเคราะห์ และสรุปผล','◎'],['media','Media Lab','สูตรอาหารและ media lot','◧'],['samples','Samples','แหล่งที่มาตัวอย่าง explant','◌'],['batches','Batches','ติดตาม culture batch และ lineage','▦'],['observations','Observations','บันทึกผลพร้อมรูปภาพ','✎'],['costing','Costing','คำนวณต้นทุน','฿'],['inventory','Inventory','วัตถุดิบและ lot','▤'],['reports','Reports','Export และ backup','⇩'],['audit','Audit Log','ตรวจสอบย้อนหลัง','≣'],['settings','Settings','ตั้งค่าระบบ','⚙']];
const seed={settings:{labName:'Tissue Me Chua RD Laboratory',ownerName:'Mooyong',currency:'THB',contamAlert:12,lowStock:5},experiments:[{id:'EXP-2026-0001',plant:'กล้วยน้ำว้า',cultivar:'Pak Chong 50',objective:'Shoot multiplication',hypothesis:'MS + BA 1.0 mg/L เพิ่มจำนวนยอด',owner:'Mooyong',status:'active',startDate:'2026-05-01',protocol:'Surface sterilization + MS multiplication protocol'},{id:'EXP-2026-0002',plant:'มอนสเตอร่า',cultivar:'Thai Constellation',objective:'Rooting optimization',hypothesis:'1/2 MS + IBA 0.5 mg/L เพิ่ม rooting rate',owner:'RD Lab',status:'active',startDate:'2026-05-08',protocol:'Root induction protocol'}],formulas:[{id:'FRM-2026-0001',name:'MS + BA 1.0 mg/L',baseMedia:'MS',pgr:'BA 1.0 mg/L',targetPh:5.75,costPerLiter:72},{id:'FRM-2026-0002',name:'1/2 MS + IBA 0.5 mg/L',baseMedia:'1/2 MS',pgr:'IBA 0.5 mg/L',targetPh:5.72,costPerLiter:54}],mediaLots:[{id:'MED-2026-0001',formulaId:'FRM-2026-0001',preparedDate:'2026-05-01',preparedBy:'Mooyong',volumeL:1.5,ph:5.75,vesselCount:42,expiryDate:'2026-06-01',autoclave:'121C 15 min',status:'available'},{id:'MED-2026-0002',formulaId:'FRM-2026-0002',preparedDate:'2026-05-08',preparedBy:'RD Lab',volumeL:1.2,ph:5.72,vesselCount:36,expiryDate:'2026-06-08',autoclave:'121C 15 min',status:'available'}],samples:[{id:'SMP-2026-0001',plant:'กล้วยน้ำว้า',cultivar:'Pak Chong 50',explantType:'Shoot tip',source:'Mother plant greenhouse A',collectedDate:'2026-05-01',preparedBy:'Mooyong',sterilization:'70% ethanol 30 sec + 10% NaOCl 12 min',note:'ตัวอย่างแข็งแรง'},{id:'SMP-2026-0002',plant:'มอนสเตอร่า',cultivar:'Thai Constellation',explantType:'Node',source:'Customer trial lot',collectedDate:'2026-05-08',preparedBy:'RD Lab',sterilization:'70% ethanol 20 sec + 8% NaOCl 10 min',note:'ใบด่างนิ่ง'}],batches:[{id:'BAT-2026-0001',experimentId:'EXP-2026-0001',treatment:'BA 1.0 mg/L',mediaLotId:'MED-2026-0001',sampleId:'SMP-2026-0001',startDate:'2026-05-01',vesselCount:42,explantCount:48,location:'Growth room A / Shelf 2',status:'active'},{id:'BAT-2026-0002',experimentId:'EXP-2026-0002',treatment:'IBA 0.5 mg/L',mediaLotId:'MED-2026-0002',sampleId:'SMP-2026-0002',startDate:'2026-05-08',vesselCount:36,explantCount:36,location:'Growth room A / Shelf 3',status:'active'}],observations:[{id:'OBS-2026-0001',batchId:'BAT-2026-0001',date:'2026-05-15',survivedCount:42,contaminatedCount:4,shootCount:86,rootCount:0,usablePlantletCount:38,contaminationType:'fungi',note:'ยอดเพิ่มดี ใบเขียว',imageData:'',imageName:'',observedBy:'Mooyong'},{id:'OBS-2026-0002',batchId:'BAT-2026-0002',date:'2026-05-15',survivedCount:31,contaminatedCount:2,shootCount:34,rootCount:16,usablePlantletCount:24,contaminationType:'none',note:'เริ่ม rooting',imageData:'',imageName:'',observedBy:'RD Lab'}],results:[{id:'RSL-2026-0001',experimentId:'EXP-2026-0001',batchId:'BAT-2026-0001',analysisNote:'BA 1.0 mg/L ให้ multiplication สูงและ contamination ต่ำ',conclusion:'pass',imageData:'',imageName:''},{id:'RSL-2026-0002',experimentId:'EXP-2026-0002',batchId:'BAT-2026-0002',analysisNote:'สูตร rooting ตอบสนองดี ควรติดตามรากเพิ่ม',conclusion:'monitor',imageData:'',imageName:''}],inventory:[{id:'INV-2026-0001',type:'chemical',name:'MS powder',lotNo:'MS-0426',supplier:'Lab supplier',unit:'g',qty:250,unitCost:3.2,expiryDate:'2027-04-30',status:'available'},{id:'INV-2026-0002',type:'consumable',name:'Culture vessel',lotNo:'VSL-0526',supplier:'Packaging supplier',unit:'pcs',qty:120,unitCost:6.5,expiryDate:'',status:'available'}],costs:[{id:'CST-2026-0001',entityType:'batch',entityId:'BAT-2026-0001',costType:'chemical',description:'Media ingredients',amount:240,currency:'THB'},{id:'CST-2026-0002',entityType:'batch',entityId:'BAT-2026-0001',costType:'consumable',description:'Vessels and caps',amount:273,currency:'THB'},{id:'CST-2026-0003',entityType:'batch',entityId:'BAT-2026-0002',costType:'chemical',description:'Rooting media',amount:195,currency:'THB'}],auditLog:[{id:'AUD-2026-0001',action:'seed',entityType:'system',entityId:'APP',detail:'Initial dataset',user:'System',timestamp:new Date().toISOString()}]};
let db=load(),view='dashboard',q='';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||structuredClone(seed)}catch{return structuredClone(seed)}}function save(){localStorage.setItem(KEY,JSON.stringify(db))}function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function money(v){return '฿'+Number(v||0).toLocaleString('th-TH',{maximumFractionDigits:2})}function pct(v){return Number(v||0).toFixed(1)+'%'}function today(){let d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}function next(prefix,arr){let y=new Date().getFullYear(),m=arr.map(x=>String(x.id||'')).filter(id=>id.startsWith(prefix+'-'+y+'-')).map(id=>+id.split('-').pop()).reduce((a,b)=>Math.max(a,b),0);return prefix+'-'+y+'-'+String(m+1).padStart(4,'0')}function audit(a,t,id,d){db.auditLog.unshift({id:next('AUD',db.auditLog),action:a,entityType:t,entityId:id,detail:d,user:db.settings.ownerName,timestamp:new Date().toISOString()})}function chip(s){return '<span class="chip '+esc(s)+'">'+esc(s||'-')+'</span>'}function byId(a,id){return a.find(x=>x.id===id)}function exp(id){return byId(db.experiments,id)}function batch(id){return byId(db.batches,id)}function obsLatest(id){return [...db.observations].filter(o=>o.batchId===id).sort((a,b)=>String(b.date).localeCompare(String(a.date)))[0]}function rates(b){let o=obsLatest(b.id)||{},st=+b.explantCount||0,s=+o.survivedCount||0,c=+o.contaminatedCount||0,sh=+o.shootCount||0,u=+o.usablePlantletCount||0;return{started:st,survived:s,contaminated:c,shoots:sh,usable:u,survival:st?s/st*100:0,contamination:st?c/st*100:0,multiplication:s?sh/s:0}}function cost(id){return db.costs.filter(c=>c.entityType==='batch'&&c.entityId===id).reduce((s,c)=>s+Number(c.amount||0),0)}function show(m){let t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
function nav(){document.getElementById('nav').innerHTML=modules.map(m=>`<button class="${view===m[0]?'active':''}" data-go="${m[0]}"><span>${m[3]}</span><span>${m[1]}</span></button>`).join('')}function render(){let m=modules.find(x=>x[0]===view)||modules[0];document.getElementById('title').textContent=m[1];document.getElementById('subtitle').textContent=m[2];nav();document.getElementById('view').innerHTML=({dashboard,experiments,media,samples,batches,observations,costing,inventory,reports,auditView,settings}[view]||dashboard)()}
function dashboard(){let rs=db.batches.map(rates),st=rs.reduce((s,r)=>s+r.started,0),su=rs.reduce((s,r)=>s+r.survived,0),co=rs.reduce((s,r)=>s+r.contaminated,0),us=rs.reduce((s,r)=>s+r.usable,0),tc=db.batches.reduce((s,b)=>s+cost(b.id),0);return `<div class="grid4"><div class="card"><span class="muted">Active experiments</span><strong>${db.experiments.filter(e=>e.status==='active').length}</strong><small>กำลังทดลอง</small></div><div class="card"><span class="muted">Survival rate</span><strong>${pct(st?su/st*100:0)}</strong><small>เฉลี่ยทุก batch</small></div><div class="card"><span class="muted">Contamination</span><strong>${pct(st?co/st*100:0)}</strong><small>เกณฑ์เตือน ${db.settings.contamAlert}%</small></div><div class="card"><span class="muted">Cost / usable</span><strong>${money(us?tc/us:0)}</strong><small>ต้นที่ใช้ได้จริง</small></div></div><div class="grid2"><section class="panel"><div class="head"><div><p class="eyebrow">Today queue</p><h3>Batch ที่ควรตรวจ</h3></div><button class="btn" data-go="observations">เปิด Observation</button></div>${batchTable(db.batches)}</section><section class="panel"><div class="head"><div><p class="eyebrow">Alerts</p><h3>สิ่งที่ต้องระวัง</h3></div></div>${db.batches.filter(b=>rates(b).contamination>db.settings.contamAlert).map(b=>`<div class="panel" style="box-shadow:none;margin-bottom:10px"><b>${b.id} contamination สูง</b><p class="muted">${pct(rates(b).contamination)} · ตรวจขั้นตอนฆ่าเชื้อ</p></div>`).join('')||'<p class="muted">ไม่มี batch เสี่ยงสูง</p>'}</section></div><section class="panel"><div class="head"><div><p class="eyebrow">Treatment performance</p><h3>ผลทดลองล่าสุด</h3></div></div><div class="grid3">${db.batches.map(b=>{let r=rates(b);return `<div class="panel" style="box-shadow:none"><b>${esc(b.treatment)}</b><p class="muted">${b.id} · ${esc(exp(b.experimentId)?.plant)}</p><div class="bar"><div class="fill" style="width:${Math.min(r.survival,100)}%"></div></div><small>${pct(r.survival)} survival · ${pct(r.contamination)} contamination · ${r.multiplication.toFixed(2)}x</small></div>`}).join('')}</div></section>`}
function batchTable(rows){return `<div class="table-wrap"><table><thead><tr><th>Batch</th><th>Experiment</th><th>Treatment</th><th>Started</th><th>Status</th></tr></thead><tbody>${rows.map(b=>`<tr><td><b>${b.id}</b></td><td>${esc(exp(b.experimentId)?.plant||'-')}<br><small>${b.experimentId}</small></td><td>${esc(b.treatment)}</td><td>${b.explantCount}</td><td>${chip(b.status)}</td></tr>`).join('')}</tbody></table></div>`}
function input(n,l,v='',req='',type='text'){return `<label><span>${l}</span><input name="${n}" type="${type}" value="${esc(v)}" ${req?'required':''}></label>`}function area(n,l,v=''){return `<label class="wide"><span>${l}</span><textarea name="${n}">${esc(v)}</textarea></label>`}function sel(n,l,opts,val=''){return `<label><span>${l}</span><select name="${n}">${opts.map(o=>`<option value="${esc(o.id??o)}" ${(o.id??o)===val?'selected':''}>${esc(o.label??o.id??o)}</option>`).join('')}</select></label>`}function form(title,type,fields){return `<form class="panel" data-form="${type}"><div class="head"><div><p class="eyebrow">Create</p><h3>${title}</h3></div></div><div class="formgrid">${fields}</div><button class="btn primary">บันทึก</button></form>`}
function experiments(){return `${form('Experiment','experiment',input('plant','ชื่อพืช','',1)+input('cultivar','สายพันธุ์')+input('objective','Objective','',1)+input('hypothesis','Hypothesis')+input('owner','ผู้รับผิดชอบ',db.settings.ownerName,1)+sel('status','Status',['draft','active','completed','archived'],'active')+input('startDate','วันที่เริ่ม',today(),1,'date')+area('protocol','Protocol'))}<section class="panel flush">${table(['Experiment ID','พืช','Objective','Owner','Status','Start'],db.experiments.map(e=>[`<b>${e.id}</b>`,`${esc(e.plant)}<br><small>${esc(e.cultivar)}</small>`,esc(e.objective),esc(e.owner),chip(e.status),e.startDate]))}</section><section class="panel"><div class="head"><div><p class="eyebrow">Result analysis</p><h3>ตารางผลทดลองพร้อมรูปภาพและวิเคราะห์ผล</h3></div><button class="btn" data-act="report">Export Report</button></div><div class="summary"><div><span>Results</span><strong>${db.results.length}</strong></div><div><span>Images</span><strong>${db.results.filter(r=>r.imageData).length}/${db.results.length}</strong></div><div><span>Pass</span><strong>${db.results.filter(r=>r.conclusion==='pass').length}</strong></div><div><span>Review</span><strong>${db.results.filter(r=>r.conclusion==='review').length}</strong></div></div>${resultTable()}</section>`}
function resultTable(){return `<div class="table-wrap"><table><thead><tr><th>Traceability</th><th>Treatment</th><th>Image</th><th>Key result</th><th>Analysis note</th><th>Conclusion</th></tr></thead><tbody>${db.results.map((r,i)=>{let b=batch(r.batchId),rr=b?rates(b):{},img=r.imageData?`<img src="${r.imageData}">`:'No image';return `<tr><td><b>${r.experimentId}</b><br><small>${r.batchId}</small></td><td>${esc(b?.treatment||'-')}</td><td><div class="photo">${img}</div><button class="btn upload">Upload<input type="file" accept="image/*" data-img="${i}"></button></td><td>Survival ${pct(rr.survival)}<br>Contam. ${pct(rr.contamination)}<br>Multiplication ${Number(rr.multiplication||0).toFixed(2)}x</td><td><textarea data-note="${i}">${esc(r.analysisNote)}</textarea></td><td><select data-conclusion="${i}">${['pass','monitor','review','reject'].map(x=>`<option ${r.conclusion===x?'selected':''}>${x}</option>`).join('')}</select></td></tr>`}).join('')}</tbody></table></div>`}
function media(){return `<div class="grid2">${form('Media Formula','formula',input('name','ชื่อสูตร','',1)+input('baseMedia','Base media','MS',1)+input('pgr','PGR')+input('targetPh','Target pH','5.75','','number')+input('costPerLiter','Cost/L','72','','number'))}${form('Media Lot','mediaLot',sel('formulaId','สูตร',db.formulas.map(f=>({id:f.id,label:f.id+' · '+f.name})))+input('preparedDate','วันที่เตรียม',today(),1,'date')+input('preparedBy','ผู้เตรียม',db.settings.ownerName,1)+input('volumeL','Volume L','1',1,'number')+input('ph','pH','5.75',1,'number')+input('vesselCount','จำนวนขวด','30',1,'number')+input('expiryDate','วันหมดอายุ',today(),1,'date')+input('autoclave','Autoclave','121C 15 min')+sel('status','Status',['available','expiring','expired','discarded'],'available'))}</div><section class="panel flush">${table(['Media Lot','Formula','Prepared','pH','Cost/Vessel','Status'],db.mediaLots.map(l=>{let f=byId(db.formulas,l.formulaId),cv=f&&l.vesselCount?+f.costPerLiter*+l.volumeL/+l.vesselCount:0;return[`<b>${l.id}</b>`,esc(f?.name||'-'),`${l.preparedDate}<br><small>${esc(l.preparedBy)}</small>`,l.ph,money(cv),chip(l.status)]}))}</section>`}
function samples(){return `${form('Sample','sample',input('plant','ชื่อพืช','',1)+input('cultivar','สายพันธุ์')+input('explantType','Explant type','Shoot tip',1)+input('source','แหล่งที่มา','',1)+input('collectedDate','วันที่เก็บ',today(),1,'date')+input('preparedBy','ผู้เตรียม',db.settings.ownerName,1)+area('sterilization','วิธีฆ่าเชื้อ')+area('note','Note'))}<section class="panel flush">${table(['Sample','Plant','Explant','Source','Sterilization','Date'],db.samples.map(s=>[`<b>${s.id}</b>`,`${esc(s.plant)}<br><small>${esc(s.cultivar)}</small>`,esc(s.explantType),esc(s.source),esc(s.sterilization),s.collectedDate]))}</section>`}
function batches(){return `${form('Culture Batch','batch',sel('experimentId','Experiment',db.experiments.map(e=>({id:e.id,label:e.id+' · '+e.plant})))+sel('mediaLotId','Media Lot',db.mediaLots.map(m=>({id:m.id,label:m.id})))+sel('sampleId','Sample',db.samples.map(s=>({id:s.id,label:s.id+' · '+s.plant})))+input('treatment','Treatment','',1)+input('startDate','วันที่เริ่ม',today(),1,'date')+input('vesselCount','จำนวนขวด','30',1,'number')+input('explantCount','จำนวน explant','30',1,'number')+input('location','Location')+sel('status','Status',['active','watch','completed','contaminated','discarded'],'active'))}<div class="grid3">${db.batches.map(b=>{let r=rates(b);return `<article class="panel"><div class="head"><div><h3>${b.id}</h3><p class="muted">${esc(exp(b.experimentId)?.plant||'-')} · ${esc(b.treatment)}</p></div>${chip(b.status)}</div><p class="muted">EXP ${b.experimentId}<br>MED ${b.mediaLotId}<br>SMP ${b.sampleId}<br>${esc(b.location||'-')}</p><div class="summary"><div><span>Started</span><strong>${b.explantCount}</strong></div><div><span>Survival</span><strong>${pct(r.survival)}</strong></div><div><span>Contam</span><strong>${pct(r.contamination)}</strong></div><div><span>Usable</span><strong>${r.usable}</strong></div></div></article>`}).join('')}</div>`}
function observations(){return `${form('Observation','observation',sel('batchId','Batch',db.batches.map(b=>({id:b.id,label:b.id+' · '+b.treatment})))+input('date','วันที่บันทึก',today(),1,'date')+input('survivedCount','จำนวนรอด','0',1,'number')+input('contaminatedCount','จำนวนปนเปื้อน','0',1,'number')+input('shootCount','จำนวนยอด','0','','number')+input('rootCount','จำนวนราก','0','','number')+input('usablePlantletCount','Usable plantlets','0','','number')+sel('contaminationType','Contamination',['none','bacteria','fungi','yeast','unknown'],'none')+input('observedBy','ผู้บันทึก',db.settings.ownerName,1)+`<label><span>รูปภาพ</span><input name="image" type="file" accept="image/*"></label>`+area('note','Note'))}<section class="panel flush">${table(['Observation','Batch','Date','Image','Survival','Contam','Usable','By'],db.observations.map(o=>{let b=batch(o.batchId),st=+b?.explantCount||0,img=o.imageData?`<img src="${o.imageData}">`:'No image';return[`<b>${o.id}</b>`,o.batchId,o.date,`<div class="photo">${img}</div>`,pct(st?o.survivedCount/st*100:0),pct(st?o.contaminatedCount/st*100:0),o.usablePlantletCount,esc(o.observedBy)]}))}</section>`}
function costing(){return `${form('Cost record','cost',sel('entityType','Entity type',['batch','media_lot','experiment'],'batch')+input('entityId','Entity ID','BAT-2026-0001',1)+sel('costType','Cost type',['chemical','consumable','labor','equipment','loss'],'chemical')+input('description','Description','',1)+input('amount','Amount','100',1,'number')+input('currency','Currency',db.settings.currency,1))}<section class="panel flush">${table(['Batch','Total','Started','Usable','Cost/explant','Cost/usable'],db.batches.map(b=>{let r=rates(b),c=cost(b.id);return[`<b>${b.id}</b>`,money(c),r.started,r.usable,money(r.started?c/r.started:0),money(r.usable?c/r.usable:0)]}))}</section>`}
function inventory(){return `${form('Inventory','inventory',sel('type','Type',['chemical','consumable','stock_solution','equipment'],'chemical')+input('name','Name','',1)+input('lotNo','Lot No','',1)+input('supplier','Supplier')+input('unit','Unit','g',1)+input('qty','Quantity','10',1,'number')+input('unitCost','Unit cost','1','','number')+input('expiryDate','Expiry date','','','date')+sel('status','Status',['available','low_stock','expired','discarded'],'available'))}<section class="panel flush">${table(['Inventory','Item','Lot','Supplier','Qty','Unit cost','Expiry','Status'],db.inventory.map(i=>[`<b>${i.id}</b>`,`${esc(i.name)}<br><small>${esc(i.type)}</small>`,esc(i.lotNo),esc(i.supplier),`${i.qty} ${esc(i.unit)}`,money(i.unitCost),i.expiryDate||'-',chip((i.expiryDate&&new Date(i.expiryDate)<new Date(today()))?'expired':(+i.qty<=+db.settings.lowStock?'low_stock':i.status))]))}</section>`}
function reports(){return `<div class="grid3"><article class="panel"><h3>Experiment Workbook</h3><p class="muted">Export CSV สำหรับ Excel หรือ BI</p><button class="btn primary" data-act="csv">Export CSV</button></article><article class="panel"><h3>Formal RD Report</h3><p class="muted">รายงานทางการ เปิดแล้ว Save as PDF ได้</p><button class="btn primary" data-act="report">Export Report</button></article><article class="panel"><h3>Backup JSON</h3><p class="muted">สำรองข้อมูลทั้งหมดรวมรูปและ audit log</p><button class="btn" data-act="backup">Backup</button></article><article class="panel"><h3>Import Backup</h3><p class="muted">นำข้อมูล JSON กลับมาใช้งาน</p><button class="btn" data-act="import">Import</button></article><article class="panel"><h3>Audit Trail</h3><p class="muted">ดูประวัติ action สำคัญ</p><button class="btn" data-go="audit">Open Audit</button></article><article class="panel"><h3>Reset Demo</h3><p class="muted">เริ่มจากข้อมูลตัวอย่างใหม่</p><button class="btn danger" data-act="reset">Reset</button></article></div>`}
function auditView(){return `<section class="panel flush">${table(['Audit','Action','Entity','Detail','User','Time'],db.auditLog.map(a=>[`<b>${a.id}</b>`,esc(a.action),`${esc(a.entityType)}<br><small>${esc(a.entityId)}</small>`,esc(a.detail),esc(a.user),new Date(a.timestamp).toLocaleString('th-TH')]))}</section>`}
function settings(){return form('Settings','settings',input('labName','Lab name',db.settings.labName,1)+input('ownerName','Default user',db.settings.ownerName,1)+input('currency','Currency',db.settings.currency,1)+input('contamAlert','Contamination alert %',db.settings.contamAlert,1,'number')+input('lowStock','Low stock alert',db.settings.lowStock,1,'number'))}
function table(h,rows){return `<div class="table-wrap"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function add(type,fd,form){let d=Object.fromEntries(fd.entries()),rec,prefix,map={experiment:['EXP','experiments'],formula:['FRM','formulas'],mediaLot:['MED','mediaLots'],sample:['SMP','samples'],batch:['BAT','batches'],observation:['OBS','observations'],cost:['CST','costs'],inventory:['INV','inventory']};if(type==='settings'){db.settings={...db.settings,labName:d.labName,ownerName:d.ownerName,currency:d.currency,contamAlert:+d.contamAlert,lowStock:+d.lowStock};audit('update','settings','LAB','Updated settings');show('Settings ถูกบันทึกแล้ว');return}let [p,k]=map[type];rec={id:next(p,db[k]),...d};['targetPh','costPerLiter','volumeL','ph','vesselCount','explantCount','survivedCount','contaminatedCount','shootCount','rootCount','usablePlantletCount','amount','qty','unitCost'].forEach(n=>{if(n in rec)rec[n]=+rec[n]||0});if(type==='observation'){let b=batch(rec.batchId);if(!b)throw Error('ไม่พบ Batch ID');if(rec.survivedCount>b.explantCount)throw Error('จำนวนรอดมากกว่า explant เริ่มต้น');if(rec.contaminatedCount>b.explantCount)throw Error('จำนวนปนเปื้อนมากกว่า explant เริ่มต้น');let f=form.querySelector('[name=image]').files[0];if(f)return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>{rec.imageData=r.result;rec.imageName=f.name;db[k].unshift(rec);audit('create',type,rec.id,'Created '+type);res()};r.onerror=rej;r.readAsDataURL(f)})}if(type==='batch')db.results.unshift({id:next('RSL',db.results),experimentId:rec.experimentId,batchId:rec.id,analysisNote:'รอผล observation เพื่อวิเคราะห์',conclusion:'monitor',imageData:'',imageName:''});db[k].unshift(rec);audit('create',type,rec.id,'Created '+type);show(rec.id+' ถูกบันทึกแล้ว')}
function reportHtml(){let rs=db.batches.map(rates),st=rs.reduce((s,r)=>s+r.started,0),su=rs.reduce((s,r)=>s+r.survived,0),co=rs.reduce((s,r)=>s+r.contaminated,0),us=rs.reduce((s,r)=>s+r.usable,0),tc=db.batches.reduce((s,b)=>s+cost(b.id),0);let rows=db.results.map(r=>{let b=batch(r.batchId),rr=b?rates(b):{},img=r.imageData?`<img src="${r.imageData}">`:'No image';return `<tr><td>${r.experimentId}<br>${r.batchId}</td><td>${esc(b?.treatment||'-')}</td><td>${img}</td><td>Survival ${pct(rr.survival)}<br>Contam ${pct(rr.contamination)}<br>Multiplication ${Number(rr.multiplication||0).toFixed(2)}x</td><td>${esc(r.analysisNote)}</td><td>${esc(r.conclusion)}</td></tr>`}).join('');return `<!doctype html><meta charset="utf-8"><title>RD Formal Report</title><style>body{font-family:Arial,sans-serif;color:#1f2723}.report{max-width:1120px;margin:auto;padding:38px}.cover{display:flex;justify-content:space-between;border-bottom:3px solid #245e54;padding-bottom:20px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{border:1px solid #dfe5df;padding:14px;border-radius:8px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #dfe5df;padding:10px;text-align:left;vertical-align:top}th{background:#e5f0ec}img{width:120px;height:88px;object-fit:cover}.sig{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:42px}.sig div{border-top:1px solid #333;text-align:center;padding-top:8px;color:#66716b}@media print{.report{padding:0}}</style><main class="report"><section class="cover"><div><p style="color:#245e54;font-weight:700">${esc(db.settings.labName)}</p><h1>Plant Tissue Culture Experiment Report</h1><p>รายงานสรุปผลการทดลองเพาะเลี้ยงเนื้อเยื่อพืช</p></div><div>Exported by: ${esc(db.settings.ownerName)}<br>${new Date().toLocaleString('th-TH')}</div></section><h2>Executive Summary</h2><div class="summary"><div class="card">Started<br><b>${st}</b></div><div class="card">Survival<br><b>${pct(st?su/st*100:0)}</b></div><div class="card">Contamination<br><b>${pct(st?co/st*100:0)}</b></div><div class="card">Cost / usable<br><b>${money(us?tc/us:0)}</b></div></div><h2>Experiment Result Table</h2><table><thead><tr><th>Traceability</th><th>Treatment</th><th>Image</th><th>Metrics</th><th>Analysis</th><th>Conclusion</th></tr></thead><tbody>${rows}</tbody></table><h2>Audit Metadata</h2><table><tr><th>Traceability keys</th><td>Experiment ID, Media Lot ID, Sample ID, Batch ID, Observation ID, Cost ID</td></tr><tr><th>Storage</th><td>Browser localStorage offline-first</td></tr></table><div class="sig"><div>Prepared by</div><div>Reviewed by</div><div>Approved by</div></div></main>`}
function dl(name,txt,type){let b=new Blob([txt],{type}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}function exportCsv(){let sec=[['Experiments',db.experiments],['MediaLots',db.mediaLots],['Samples',db.samples],['Batches',db.batches],['Observations',db.observations.map(({imageData,...x})=>x)],['Costs',db.costs],['Inventory',db.inventory],['Audit',db.auditLog]],csv=sec.map(([t,rows])=>{let h=Object.keys(rows[0]||{});return [t,h.join(','),...rows.map(r=>h.map(x=>`"${String(r[x]??'').replaceAll('"','""')}"`).join(','))].join('\n')}).join('\n\n');audit('export','report','CSV','Exported CSV');save();dl('tissue-me-chua-rd.csv',csv,'text/csv;charset=utf-8');show('Export CSV แล้ว')}
document.addEventListener('click',e=>{let go=e.target.closest('[data-go]');if(go){view=go.dataset.go;render()}let act=e.target.closest('[data-act]');if(!act)return;let a=act.dataset.act;if(a==='backup'){audit('export','backup','JSON','Exported backup');save();dl('tissue-me-chua-rd-backup.json',JSON.stringify(db,null,2),'application/json');show('Backup แล้ว')}if(a==='csv')exportCsv();if(a==='report'){audit('export','report','HTML','Exported formal report');save();dl('tissue-me-chua-rd-report.html',reportHtml(),'text/html;charset=utf-8');show('Export report แล้ว')}if(a==='import')document.getElementById('importFile').click();if(a==='reset'&&confirm('Reset demo data?')){db=structuredClone(seed);audit('reset','system','APP','Reset demo');save();render();show('Reset แล้ว')}});
document.addEventListener('submit',async e=>{let f=e.target.closest('[data-form]');if(!f)return;e.preventDefault();try{let r=add(f.dataset.form,new FormData(f),f);if(r instanceof Promise)await r;save();f.reset();render()}catch(err){show(err.message)}});document.addEventListener('input',e=>{if(e.target.id==='search'){q=e.target.value.trim();}if(e.target.matches('[data-note]')){db.results[+e.target.dataset.note].analysisNote=e.target.value;save()}});document.addEventListener('change',e=>{if(e.target.matches('[data-conclusion]')){db.results[+e.target.dataset.conclusion].conclusion=e.target.value;audit('update','result',db.results[+e.target.dataset.conclusion].id,'Updated conclusion');save();render()}if(e.target.matches('[data-img]')){let i=+e.target.dataset.img,f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{db.results[i].imageData=r.result;db.results[i].imageName=f.name;audit('update','result',db.results[i].id,'Attached image');save();render();show('แนบรูปแล้ว')};r.readAsDataURL(f)}});document.getElementById('importFile').addEventListener('change',e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let x=JSON.parse(r.result);if(!Array.isArray(x.experiments)||!Array.isArray(x.batches))throw Error('schema ไม่ถูกต้อง');db={...structuredClone(seed),...x,settings:{...seed.settings,...x.settings}};audit('import','backup',f.name,'Imported backup');save();render();show('Import สำเร็จ')}catch(err){show('Import ไม่สำเร็จ: '+err.message)}};r.readAsText(f)});
save();render();
</script>
</body>
