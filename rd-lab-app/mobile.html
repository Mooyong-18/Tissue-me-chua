<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f7f5">
<title>Tissue Me Chua RD Lab Mobile</title>
<style>
:root{--bg:#f6f7f5;--surface:#fff;--line:#dfe5df;--text:#1f2723;--muted:#66716b;--accent:#3c7f72;--accent2:#245e54;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box}html,body{width:100%;max-width:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.phone{width:100%;max-width:100vw;height:100dvh;min-width:0;overflow:hidden;display:grid;grid-template-rows:auto minmax(0,1fr) auto}.mobile-top{min-width:0;max-width:100vw;overflow:hidden;background:rgba(246,247,245,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:12px 14px 10px;z-index:2}.brand-row{display:flex;align-items:center;justify-content:space-between;gap:10px;min-width:0}.brand{display:flex;align-items:center;gap:10px;min-width:0}.mark{width:38px;height:38px;border-radius:8px;background:var(--text);color:#fff;display:grid;place-items:center;font-weight:850;flex:0 0 auto}.brand-title{font-weight:820;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand-sub{color:var(--muted);font-size:12px}.top-btn{width:40px;height:40px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);flex:0 0 auto}.rail{width:100%;min-width:0;max-width:100%;display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding-top:10px;scrollbar-width:none}.rail::-webkit-scrollbar{display:none}.chip{height:34px;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:0 12px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;flex:0 0 auto}.chip.active{background:#e5f0ec;color:var(--accent2);border-color:#c9ddd6;font-weight:760}iframe{width:100%;max-width:100%;min-width:0;height:100%;border:0;background:var(--bg);display:block}.bottom{width:100%;min-width:0;max-width:100vw;overflow:hidden;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:6px 8px calc(6px + var(--safe));display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:4px;z-index:2}.bottom button{min-width:0;height:56px;border:0;background:transparent;border-radius:8px;color:var(--muted);display:grid;place-items:center;font-size:10.5px;padding:4px 2px;overflow:hidden}.bottom b{font-size:18px;line-height:1}.bottom span{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bottom button.active{background:#e5f0ec;color:var(--accent2);font-weight:760}.loading{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);color:var(--muted);z-index:10}.loading.hide{display:none}@media(min-width:760px){html,body{overflow:auto}.phone{max-width:480px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line)}}
</style>
</head>
<body>
<div class="phone">
<header class="mobile-top">
  <div class="brand-row"><div class="brand"><div class="mark">TM</div><div><div class="brand-title">Tissue Me Chua RD</div><div class="brand-sub">Mobile Lab System</div></div></div><button class="top-btn" id="backupBtn">⇩</button></div>
  <nav class="rail" id="rail"></nav>
</header>
<iframe id="appFrame" src="index.html" title="Tissue Me Chua RD Lab"></iframe>
<nav class="bottom" id="bottom"></nav>
</div>
<div class="loading" id="loading">กำลังปรับหน้าจอสำหรับโทรศัพท์...</div>
<script>
const modules=[['dashboard','Dashboard','⌂'],['experiments','Experiments','◎'],['media','Media','◧'],['samples','Samples','◌'],['batches','Batches','▦'],['observations','Observe','✎'],['costing','Costing','฿'],['inventory','Stock','▤'],['reports','Reports','⇩'],['audit','Audit','≣'],['settings','Settings','⚙']];
const bottom=['dashboard','experiments','observations','batches','reports'];let current='dashboard';const frame=document.getElementById('appFrame');
function renderNav(){document.getElementById('rail').innerHTML=modules.map(m=>`<button class="chip ${current===m[0]?'active':''}" data-go="${m[0]}"><span>${m[2]}</span>${m[1]}</button>`).join('');document.getElementById('bottom').innerHTML=bottom.map(id=>{const m=modules.find(x=>x[0]===id);return`<button class="${current===id?'active':''}" data-go="${id}"><b>${m[2]}</b><span>${m[1]}</span></button>`}).join('')}
function inject(){const d=frame.contentDocument;if(!d)return;let style=d.getElementById('mobileShellStyle');if(!style){style=d.createElement('style');style.id='mobileShellStyle';style.textContent=`
html,body{width:100%!important;max-width:100%!important;overflow-x:hidden!important;background:#f6f7f5!important}.app{display:block!important;min-height:auto!important;padding-bottom:86px!important;max-width:100%!important;overflow-x:hidden!important}.side{display:none!important}.main{padding:14px!important;max-width:100%!important;overflow-x:hidden!important}.top{position:sticky!important;top:0!important;z-index:5!important;background:rgba(246,247,245,.96)!important;backdrop-filter:blur(14px)!important;border-bottom:1px solid #dfe5df!important;margin:-14px -14px 14px!important;padding:12px 14px!important;display:block!important}.top h2{font-size:24px!important}.actions{margin-top:10px!important;display:grid!important;grid-template-columns:minmax(0,1fr) 92px!important;gap:8px!important}.actions .btn.primary{grid-column:1/-1!important}.search{width:100%!important;min-width:0!important}.grid4{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:10px!important}.grid3,.grid2,.formgrid,.summary{grid-template-columns:1fr!important}.card{min-height:104px!important;padding:14px!important}.card strong{font-size:26px!important}.panel{padding:14px!important;border-radius:8px!important}.head{align-items:stretch!important;flex-direction:column!important}.btn{width:100%!important}.table-wrap{overflow-x:auto!important;max-width:100%!important}table{min-width:680px!important}.toast{left:14px!important;right:14px!important;bottom:92px!important;max-width:none!important}.photo{width:108px!important;height:78px!important}`;d.head.appendChild(style)}document.getElementById('loading').classList.add('hide')}
function go(id){current=id;renderNav();const d=frame.contentDocument;const btn=d&&d.querySelector(`[data-go="${id}"]`);if(btn)btn.click();setTimeout(inject,80)}
document.addEventListener('click',e=>{const b=e.target.closest('[data-go]');if(b)go(b.dataset.go)});document.getElementById('backupBtn').onclick=()=>{const d=frame.contentDocument;const b=d&&d.querySelector('[data-act="backup"]');if(b)b.click()};frame.addEventListener('load',()=>{inject();go(current)});renderNav();setTimeout(inject,1200);
</script>
</body>
</html>
