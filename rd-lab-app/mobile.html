:root{--bg:#f7fbfa!important;--surface:#fff!important;--soft:#eaf6f1!important;--text:#13251f!important;--muted:#66766f!important;--line:#d9e8e4!important;--accent:#087b78!important;--accent2:#07579a!important;--good:#168338!important;--shadow:0 12px 28px rgba(7,87,154,.08)!important}html,body{width:100%!important;max-width:100%!important;overflow-x:hidden!important;background:linear-gradient(135deg,#f7fbfa 0%,#eef8f5 58%,#f5fbf2 100%)!important;color:#13251f!important}.app{display:block!important;min-height:auto!important;padding-bottom:86px!important;max-width:100%!important;overflow-x:hidden!important}.side,.desktop-side,.mobile-head,.bottom-nav{display:none!important}.main{padding:14px!important;max-width:100%!important;overflow-x:hidden!important}.top{position:sticky!important;top:0!important;z-index:5!important;background:rgba(255,255,255,.96)!important;backdrop-filter:blur(16px)!important;border-bottom:1px solid #d9e8e4!important;margin:-14px -14px 14px!important;padding:14px!important;display:block!important}.top:before{content:'Tissue Me Chua R&D';display:block;color:#07579a;font-size:11px;font-weight:850;letter-spacing:.02em;text-transform:uppercase;margin-bottom:5px}.top h2,#title{font-size:24px!important;color:#13251f!important}.eyebrow{color:#087b78!important}.actions{margin-top:10px!important;display:grid!important;grid-template-columns:minmax(0,1fr) 92px!important;gap:8px!important}.actions .btn.primary{grid-column:1/-1!important}.search{width:100%!important;min-width:0!important;border-color:#d9e8e4!important;background:#fff!important}.grid4{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:10px!important}.grid3,.grid2,.formgrid,.form-grid,.summary{grid-template-columns:1fr!important}.card,.metric,.panel,.item-card{border-color:#d9e8e4!important;background:#fff!important;border-radius:10px!important;box-shadow:0 10px 24px rgba(7,87,154,.07)!important}.card,.metric{min-height:104px!important;padding:14px!important}.card strong,.metric strong{font-size:26px!important;color:#13251f!important}.panel{padding:14px!important}.head,.panel-head{align-items:stretch!important;flex-direction:column!important}.btn{width:100%!important;border-radius:10px!important;border-color:#d9e8e4!important}.btn.primary{background:linear-gradient(135deg,#07579a,#087b78 54%,#22a114)!important;border-color:transparent!important;color:#fff!important}.chip.active,.active,.available,.pass{background:linear-gradient(135deg,rgba(7,87,154,.10),rgba(34,161,20,.12))!important;color:#07579a!important}.table-wrap{overflow-x:auto!important;max-width:100%!important}table{min-width:680px!important}.toast{left:14px!important;right:14px!important;bottom:92px!important;max-width:none!important;background:#13251f!important}.photo{width:108px!important;height:78px!important}`;d.head.appendChild(style)}document.getElementById('loading').classList.add('hide')}
function go(id){current=id;renderNav();const d=frame.contentDocument;const btn=d&&d.querySelector(`[data-go="${id}"]`);if(btn)btn.click();setTimeout(inject,80)}
document.addEventListener('click',e=>{const b=e.target.closest('[data-go]');if(b)go(b.dataset.go)});document.getElementById('backupBtn').onclick=()=>{const d=frame.contentDocument;const b=d&&d.querySelector('[data-act="backup"]');if(b)b.click()};frame.addEventListener('load',()=>{inject();go(current)});renderNav();setTimeout(inject,1200);
